[pytest]
minversion = 9.0

# When loaded via "-c config/pytest.ini", rootdir is "config/".
# These relative paths point back to the project root.
pythonpath = ..
testpaths = ../tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

addopts = -ra --strict-config --strict-markers
norecursedirs = .git .venv .pytest_cache __pycache__ build dist
cache_dir = ../.pytest_cache
